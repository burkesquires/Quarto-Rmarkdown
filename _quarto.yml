format:
  html:
    theme:
      light: [cosmo, styles.scss]
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    fig-width: 7
    fig-height: 4.5
    fig-align: center
    df-print: paged
    link-external-newwindow: true

bibliography: references.bib

execute:
  freeze: auto
